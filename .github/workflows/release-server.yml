name: Release Server

on:
  push:
    tags: ["server/v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Note: no pre-release test/clippy job here. The merge to main already
  # passed both via ci.yml on the exact SHA being tagged, and the toolchain
  # is pinned via rust-toolchain.toml so there's no drift between the
  # ci.yml run and this build. See .taskmaster/docs/test-cycle-perf.md.
  #
  # Server is Linux-only by design (deployed as a containerised service);
  # no macOS/Windows build matrix is intended.
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false so amd64 / arm64 don't take each other out on a
      # transient flake.
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
            artifact_server: secrt-server-linux-amd64
            artifact_admin: secrt-admin-linux-amd64
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
            artifact_server: secrt-server-linux-arm64
            artifact_admin: secrt-admin-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web frontend
        working-directory: web
        run: pnpm install --frozen-lockfile && pnpm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build server
        run: cross build --release -p secrt-server --target ${{ matrix.target }}

      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/secrt-server ${{ matrix.artifact_server }}
          cp target/${{ matrix.target }}/release/secrt-admin ${{ matrix.artifact_admin }}

      - name: Upload server artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_server }}
          path: ${{ matrix.artifact_server }}

      - name: Upload admin artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_admin }}
          path: ${{ matrix.artifact_admin }}

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout so the release step can read CHANGELOG.md for the
      # version-specific entry. Shallow clone is fine — we only read files
      # at the tagged SHA, not git history.
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum secrt-server-* secrt-admin-* > secrt-server-checksums-sha256.txt

      - name: Show checksums
        run: cat artifacts/secrt-server-checksums-sha256.txt

      # Extract the changelog entry for the version in this tag. Fails the
      # job if no entry exists — forces every server/v* tag to ship with a
      # CHANGELOG entry, closing the historical "release published with
      # auto-generated body" gap. Body file is consumed by the next step.
      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#server/v}"
          echo "Extracting CHANGELOG entry for $VERSION"
          scripts/extract-changelog-entry.sh \
            crates/secrt-server/CHANGELOG.md \
            "$VERSION" \
            > /tmp/release_notes.md
          echo "----- release notes -----"
          cat /tmp/release_notes.md
          echo "-------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Title set explicitly to the tag name (e.g. server/v0.17.5) per
          # CLAUDE.md release procedure — keeps tag and release name aligned
          # in the GitHub UI and in `gh release view` output.
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          # Disable auto-generated notes — the CHANGELOG entry is the
          # canonical, human-curated description. The auto "Full Changelog"
          # compare link is rarely clicked and adds noise.
          generate_release_notes: false
          make_latest: false
          files: |
            artifacts/secrt-server-linux-amd64
            artifacts/secrt-server-linux-arm64
            artifacts/secrt-admin-linux-amd64
            artifacts/secrt-admin-linux-arm64
            artifacts/secrt-server-checksums-sha256.txt
