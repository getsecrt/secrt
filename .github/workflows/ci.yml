name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch/PR.
# Without this, every push burns the full 3×OS matrix even if the previous
# run is obsolete seconds later. Main branch runs are not cancelled (each
# main commit deserves its own green checkmark).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # rust-toolchain.toml pins the channel; this action picks it up
      # automatically. Components beyond `minimal` are added per-job.
      # `@stable` matches release-server.yml — pinning to a tag instead
      # of `@master` so action behavior changes don't surprise CI.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Format + clippy run on ubuntu only — they're platform-agnostic and
      # running them on three OSes wastes minutes. Doing them inline (vs a
      # separate job) avoids paying a second runner's setup overhead.
      - name: Format check (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Clippy (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --exclude secrt-desktop --all-targets -- -D warnings

      - name: Test
        run: cargo nextest run --workspace --exclude secrt-desktop

      # Doctests run on ubuntu only — they exercise pure Rust API surface
      # that's identical across platforms; nextest does not run them.
      - name: Doctests (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --doc --workspace --exclude secrt-desktop

  frontend:
    name: Frontend (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: web
        run: pnpm check

      - name: Vitest
        working-directory: web
        run: pnpm test

      # SRI integration test (web/vite-plugins/sri.integration.test.ts) is
      # gated behind SRI_VERIFY_BUILD=1 because vanilla `pnpm test` doesn't
      # run `vite build`, and reading `web/dist/index.html` without a fresh
      # build would either skip silently or assert against stale bytes.
      # We build first, then re-run vitest with the gate enabled — this
      # exercises the real production bundle's integrity attributes.
      - name: Build production bundle
        working-directory: web
        run: pnpm build

      - name: Vitest (SRI verification against built bundle)
        working-directory: web
        run: pnpm test:sri
