name: Release CLI

on:
  push:
    tags: ["cli/v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Note: no pre-release test/clippy job here. The merge to main already
  # passed both via ci.yml on the exact SHA being tagged, and the toolchain
  # is pinned via rust-toolchain.toml so there's no drift between the
  # ci.yml run and this build. See .taskmaster/docs/test-cycle-perf.md.
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
    strategy:
      # fail-fast: false so a transient flake on one platform doesn't waste
      # the rest of the matrix and force a re-tag. Re-tagging costs more
      # than running the surviving builds to completion.
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-latest
            tool: cargo
            artifact: secrt-darwin-arm64
          - name: darwin-amd64
            target: x86_64-apple-darwin
            runner: macos-latest
            tool: cargo
            artifact: secrt-darwin-amd64
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            artifact: secrt-linux-amd64
          - name: linux-arm64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            tool: cross
            artifact: secrt-linux-arm64
          - name: windows-amd64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            tool: cargo
            artifact: secrt-windows-amd64.exe
          - name: windows-arm64
            target: aarch64-pc-windows-msvc
            runner: windows-latest
            tool: cargo
            artifact: secrt-windows-arm64.exe

    steps:
      - uses: actions/checkout@v6
      # Install the cross-target against the toolchain pinned in
      # rust-toolchain.toml. Using dtolnay/rust-toolchain@stable here
      # would install the target on `stable` but the build runs on the
      # pinned channel, leaving the target missing (E0463: can't find
      # crate for `core`/`std`). Explicit `rustup target add` runs in
      # the repo cwd where rust-toolchain.toml is the override, so the
      # target lands on the right channel and rustup auto-installs the
      # pinned toolchain on first invocation.
      - name: Install Rust cross-target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for musl builds (handles ring's C/asm compilation in Docker)
      - name: Install cross
        if: matrix.tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: ${{ matrix.tool }} build --release -p secrt-cli --target ${{ matrix.target }}

      # macOS code signing
      - name: Import Apple certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Codesign macOS binary
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          codesign --sign "Developer ID Application: Joseph Lien (A93Q7MKECL)" \
            --options runtime --timestamp \
            target/${{ matrix.target }}/release/secrt
          codesign --verify --verbose target/${{ matrix.target }}/release/secrt

      # Windows code signing via Azure Artifact Signing
      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.HAS_AZURE_SIGNING == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://wus.codesigning.azure.net/
          trusted-signing-account-name: jdlien-signing
          certificate-profile-name: jdlien-public-trust
          files: ${{ github.workspace }}/target/${{ matrix.target }}/release/secrt.exe

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/secrt ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/secrt.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  universal-macos:
    name: Universal macOS binary
    needs: build
    runs-on: macos-latest
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
      HAS_INSTALLER_CERT: ${{ secrets.APPLE_INSTALLER_P12 != '' }}
    steps:
      - name: Download macOS ARM binary
        uses: actions/download-artifact@v8
        with:
          name: secrt-darwin-arm64

      - name: Download macOS Intel binary
        uses: actions/download-artifact@v8
        with:
          name: secrt-darwin-amd64

      - name: Create universal binary
        run: |
          lipo -create secrt-darwin-arm64 secrt-darwin-amd64 -output secrt-darwin-universal
          chmod +x secrt-darwin-universal
          lipo -info secrt-darwin-universal

      - name: Import Apple certificate
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Codesign universal binary
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          codesign --sign "Developer ID Application: Joseph Lien (A93Q7MKECL)" \
            --force --options runtime --timestamp \
            secrt-darwin-universal
          codesign --verify --verbose secrt-darwin-universal

      - name: Import Installer certificate
        if: env.HAS_INSTALLER_CERT == 'true'
        env:
          APPLE_INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_P12 }}
          APPLE_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_INSTALLER_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/installer-cert.p12
          security import $RUNNER_TEMP/installer-cert.p12 -P "$APPLE_INSTALLER_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH

      - name: Build and sign installer packages
        if: env.HAS_INSTALLER_CERT == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#cli/v}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.0"; fi
          # macOS Installer compares CFBundleShortVersionString-style values
          # numerically and can misorder prerelease strings like "0.16.0-rc.1".
          # Strip the suffix for the embedded pkg version so an upgrade from
          # 0.16.0-rc.1 → 0.16.0 still registers as an upgrade. The pkg
          # *file* name is unchanged.
          PKG_VERSION="${VERSION%%-*}"
          for pair in "secrt-darwin-universal:secrt-macos" "secrt-darwin-arm64:secrt-macos-arm64" "secrt-darwin-amd64:secrt-macos-amd64"; do
            src="${pair%%:*}"
            pkg_name="${pair##*:}"
            mkdir -p pkg-root/usr/local/bin
            cp "$src" pkg-root/usr/local/bin/secrt
            chmod +x pkg-root/usr/local/bin/secrt
            pkgbuild --root pkg-root \
              --identifier ca.secrt.cli \
              --version "$PKG_VERSION" \
              --install-location / \
              "${pkg_name}-unsigned.pkg"
            productsign --sign "Developer ID Installer: Joseph Lien (A93Q7MKECL)" \
              "${pkg_name}-unsigned.pkg" "${pkg_name}.pkg"
            rm -rf pkg-root "${pkg_name}-unsigned.pkg"
          done

      # Submit the raw-binaries zip and all .pkg files to Apple's notary
      # service in parallel. Each `notarytool submit --wait` blocks ~3-5min
      # on Apple's queue; running them concurrently saves the equivalent
      # of one full notarization round-trip per release. Apple's notary
      # accepts multiple concurrent submissions from a single Apple ID
      # (the prior code already submitted 3 .pkg files in parallel; one
      # more concurrent submission is no different from Apple's view).
      - name: Notarize macOS binaries and packages
        if: env.HAS_APPLE_ID == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          zip secrt-notarize.zip secrt-darwin-arm64 secrt-darwin-amd64 secrt-darwin-universal
          submissions=("secrt-notarize.zip")
          if [[ "$HAS_INSTALLER_CERT" == "true" ]]; then
            submissions+=("secrt-macos.pkg" "secrt-macos-arm64.pkg" "secrt-macos-amd64.pkg")
          fi
          for item in "${submissions[@]}"; do
            xcrun notarytool submit "$item" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait &
          done
          wait

      - name: Staple installer packages
        if: env.HAS_APPLE_ID == 'true' && env.HAS_INSTALLER_CERT == 'true'
        run: |
          for pkg in secrt-macos.pkg secrt-macos-arm64.pkg secrt-macos-amd64.pkg; do
            xcrun stapler staple "$pkg"
          done

      - name: Upload macOS release archives
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-pkgs
          path: |
            secrt-macos.pkg
            secrt-macos-arm64.pkg
            secrt-macos-amd64.pkg

      # Raw signed (but unstapled — `xcrun stapler` does not support
      # standalone Mach-O binaries) universal binary, ready to be tarballed
      # and published as `secrt-darwin-universal` for human download. The
      # `secrt update` self-update path consumes the per-arch raw binaries
      # (`secrt-darwin-arm64` / `secrt-darwin-amd64`) which were already
      # uploaded by the per-platform `build` job.
      - name: Upload universal raw binary
        uses: actions/upload-artifact@v7
        with:
          name: secrt-darwin-universal
          path: secrt-darwin-universal

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      # Checkout so the release step can read CHANGELOG.md for the
      # version-specific entry. Shallow clone is fine — we only read files
      # at the tagged SHA, not git history.
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create archives
        working-directory: artifacts
        run: |
          # macOS .pkg installers arrive pre-built from the universal-macos job.
          # Raw per-platform binaries (secrt-{linux,darwin,windows}-{amd64,arm64}[.exe])
          # arrive directly from the build matrix and are uploaded as-is to
          # the release for `secrt update` to consume.

          # Linux archives (tar.gz containing 'secrt')
          for arch in linux-amd64 linux-arm64; do
            cp "secrt-${arch}" secrt
            chmod +x secrt
            tar czf "secrt-${arch}.tar.gz" secrt
            rm secrt
          done

          # macOS archives (tar.gz containing 'secrt'). Mirrors the Linux
          # tarball shape for human-install consistency. The raw signed
          # binaries (secrt-darwin-amd64, secrt-darwin-arm64,
          # secrt-darwin-universal) are also uploaded directly so
          # `secrt update` can pull them without unpacking an archive.
          for arch in darwin-amd64 darwin-arm64 darwin-universal; do
            cp "secrt-${arch}" secrt
            chmod +x secrt
            # Output filename uses 'macos' for the human-facing name even
            # though the asset/host triplet uses 'darwin'.
            out="secrt-macos-${arch#darwin-}.tar.gz"
            tar czf "$out" secrt
            rm secrt
          done

          # Windows archives (zip containing 'secrt.exe')
          for arch in windows-amd64 windows-arm64; do
            cp "secrt-${arch}.exe" secrt.exe
            zip "secrt-${arch}.zip" secrt.exe
            rm secrt.exe
          done

      - name: Generate checksums
        working-directory: artifacts
        # Order: raw binaries first (consumed by `secrt update`), then human
        # archives (consumed by install.sh / brew / direct download). Every
        # asset attached to the release MUST have an entry here so the
        # self-update SHA-256 verify never trusts an asset that was added
        # without the matching checksum.
        run: |
          sha256sum \
            secrt-linux-amd64 secrt-linux-arm64 \
            secrt-darwin-amd64 secrt-darwin-arm64 secrt-darwin-universal \
            secrt-windows-amd64.exe secrt-windows-arm64.exe \
            secrt-linux-*.tar.gz secrt-macos-*.tar.gz secrt-macos*.pkg \
            secrt-windows-*.zip \
            > secrt-checksums-sha256.txt

      - name: Show checksums
        run: cat artifacts/secrt-checksums-sha256.txt

      # Extract the changelog entry for the version in this tag. Fails the
      # job if no entry exists — forces every cli/v* tag to ship with a
      # CHANGELOG entry, closing the historical "release published with
      # auto-generated body" gap. Body file is consumed by the next step.
      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#cli/v}"
          echo "Extracting CHANGELOG entry for $VERSION"
          scripts/extract-changelog-entry.sh \
            crates/secrt-cli/CHANGELOG.md \
            "$VERSION" \
            > /tmp/release_notes.md
          echo "----- release notes -----"
          cat /tmp/release_notes.md
          echo "-------------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Title set explicitly to the tag name (e.g. cli/v0.17.5) per
          # CLAUDE.md release procedure — keeps tag and release name aligned
          # in the GitHub UI and in `gh release view` output.
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          # Disable auto-generated notes — the CHANGELOG entry is the
          # canonical, human-curated description. The auto "Full Changelog"
          # compare link is rarely clicked and adds noise.
          generate_release_notes: false
          # Two distinct asset audiences:
          #   1. `secrt update` self-update path → raw per-platform binaries
          #      (must match raw_asset_name() in crates/secrt-cli/src/update.rs).
          #   2. install.sh / brew / human download → archives + .pkg files.
          # Both audiences share the single secrt-checksums-sha256.txt.
          files: |
            artifacts/secrt-linux-amd64
            artifacts/secrt-linux-arm64
            artifacts/secrt-darwin-amd64
            artifacts/secrt-darwin-arm64
            artifacts/secrt-darwin-universal
            artifacts/secrt-windows-amd64.exe
            artifacts/secrt-windows-arm64.exe
            artifacts/secrt-macos.pkg
            artifacts/secrt-macos-arm64.pkg
            artifacts/secrt-macos-amd64.pkg
            artifacts/secrt-linux-amd64.tar.gz
            artifacts/secrt-linux-arm64.tar.gz
            artifacts/secrt-macos-amd64.tar.gz
            artifacts/secrt-macos-arm64.tar.gz
            artifacts/secrt-macos-universal.tar.gz
            artifacts/secrt-windows-amd64.zip
            artifacts/secrt-windows-arm64.zip
            artifacts/secrt-checksums-sha256.txt
